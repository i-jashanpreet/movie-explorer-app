<!DOCTYPE html>
<html>
<head>
  <title>Movie Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎬 Movie Explorer</h1>
</header>

<div class="search-container">
  <input type="text" id="search" placeholder="Search movies..." />
</div>

<div class="controls">
  <button onclick="sortByDate()">🔥 Latest</button>
  <button onclick="sortByRating()">⭐ Top Rated</button>
  <button onclick="filterPlatform('netflix')">🎬 Netflix</button>
  <button onclick="filterPlatform('prime')">📺 Prime</button>
  <button onclick="filterPlatform('all')">🌍 All</button>
  <button onclick="toggleMode()">🌙</button>
</div>

<div id="movies"></div>

<script src="script.js"></script>
</body>
</html>
